name: Labeling
defaults:
  run:
    shell: bash
jobs:
  labeling:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        sparse-checkout: |
          .github
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: labeling.js inspection"
        if [ -f .github/workflows/labeling.js ]; then
          printf 'GARALT_DBG: File found. Content:\n'
          cat .github/workflows/labeling.js
        else
          echo 'GARALT_DBG: labeling.js NOT FOUND in checkout'
          find .github -type f 2>/dev/null | head -20 || echo 'No .github directory contents found'
        fi
      continue-on-error: true
    - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        script: |
          const script = require('./.github/workflows/labeling.js');
          await script({ github, context });
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  issues:
    types:
    - opened
    - edited
  pull_request_target:
    types:
    - opened
    - edited
    - ready_for_review
